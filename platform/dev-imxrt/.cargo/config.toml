[target.thumbv8m.main-none-eabihf]
# runner = 'probe-rs run --chip MIMXRT685SFVKB --preverify --verify'
runner = './flash.sh' # For some reason probe-rs through WSL doesn't work great on this platform, so this script copies the binary to Windows and flashes via Windows probe-rs

rustflags = [
  "-C",
  "linker=flip-link",
  "-C",
  "link-arg=-Tlink.x",
  "-C",
  "link-arg=-Tdefmt.x",
  # This is needed if your flash or ram addresses are not aligned to 0x10000 in memory.x
  # See https://github.com/rust-embedded/cortex-m-quickstart/pull/95
  "-C",
  "link-arg=--nmagic",
]

[build]
target = "thumbv8m.main-none-eabihf" # Cortex-M33

[env]
DEFMT_LOG = "trace"
